        function caixa(text, char) {
            let linha = '+' + char
            for(let i = 0; i < text.length; i++) {
                linha = linha + char
            }
            linha = linha + char + '+';
            console.log(linha);
            console.log('+ '+text+' +');
            console.log(linha);
        }
        
        let nome = 'Ana';
        caixa(nome, '*')
        caixa('oi gente', '#')
