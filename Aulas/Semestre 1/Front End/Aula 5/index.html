<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Super Mario Bros</title>
</head>
<body>

    <nav>
        <ul>
            <li><a href="#inicio">Início</a></li>
            <li><a href="#personagens">Personagens</a></li>
            <li><a href="#poderes">Poderes</a></li>
            <li><a href="#viloes">Vilões</a></li>
            <li><a href="#final">Final</a></li>
        </ul>
    </nav>
    
    <div id="banner" class="container">
        <img src="./imagens/logo.png" alt="Super Mario Bros - Logo">
    </div>

    <div id="inicio" class="container">
        <a href="#personagens" class="botao">Novo jogo</a>
        <a href="#personagens" class="botao">Carregar jogo</a>
    </div>

    <div id="personagens" class="container">
        <h2>Escolha seu personagem</h2>
        <div class="personagens-lista">
            <div class="personagens-item">
                <img src="imagens/personagens/mario.jpg" alt="Personagem de jogo em vermelho">
                <h4>Mario</h4>
            </div>
            <div class="personagens-item">
                <img src="imagens/personagens/luigi.jpg" alt="Personagem de jogo em verde">
                <h4>Luigi</h4>
            </div>
            <div class="personagens-item">
                <img src="imagens/personagens/yoshi.jpg" alt="Personagem dinossauro">
                <h4>Yoshi</h4>
            </div>
            <div class="personagens-item">
                <img src="imagens/personagens/toad.jpg" alt="Personagem de jogo em vermelho">
                <h4>Toad</h4>
            </div>
        </div>
    </div>

    <div id="poderes" class="container">
        <h2>Colete poderes especiais</h2>
        <div class="poderes-lista">
            <img src="imagens/poderes/cogumelo-vermelho.jpg" alt="Cogumelo animado vermelho">
            <img src="imagens/poderes/cogumelo-verde.jpg" alt="Cogumelo animado verde">
            <img src="imagens/poderes/cogumelo-azul.jpg" alt="Cogumelo animado azul">
            <img src="imagens/poderes/flor-fogo.jpg" alt="Flor animado vermelho">
            <img src="imagens/poderes/flor-gelo.jpg" alt="Flor animado azul">
            <img src="imagens/poderes/cogumelo-voador.jpg" alt="Cogumelo animado voador">
            <img src="imagens/poderes/estrela.jpg" alt="Estrela animada amarela">
            <img src="imagens/poderes/pinguim.jpg" alt="Pinguim azul">
        </div>
    </div>

    <div id="viloes" class="container">
        <h2>Enfrente os inimigos</h2>
        <div class="viloes-lista">

            <div class="mario">
                <img src="imagens/personagens/mario.jpg" alt="Personagem de jogo em vermelho">
            </div>

            <div class="viloes-lista">
                <img src="imagens/viloes/bowser.jpg" alt="Tartaruga do mal">
                <img src="imagens/viloes/wario.jpg" alt="Personagem amarelo">
                <img src="imagens/viloes/waluigi.jpg" alt="Personagem roxo">
                <img src="imagens/viloes/drybones.jpg" alt="Dry Bones, a skeletal turtle villain from Super Mario, stands upright with mouth open and arms raised in a startled pose, set against a plain white background">
            </div>
        </div>
    </div>

    <div id="final" class="container">
        <h2>E salve o reino</h2>
        <div class="final-list">
            <img class="princesas" src="imagens/final/peach.png" alt="Princesa rosa">
            <img src="imagens/final/castelo.png" alt="Castelo cinza">
            <img class="princesas" src="imagens/final/daisy.png" alt="Princesa amarela">
        </div>
    </div>

</body>
</html>
